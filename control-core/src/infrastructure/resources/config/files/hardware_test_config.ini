# 硬件测试功能配置文件
# Feature: 007-hardware-test-functions
# 本文件定义测试功能的安全限制、测试参数和显示参数

[SafetyLimits]
# 最大点动速度 (mm/s) - 必须符合安全配置限制
MaxJogSpeed=10.0

# 最大回零速度 (mm/s) - 必须符合安全配置限制
MaxHomingSpeed=10.0

# X轴软限位 (mm) - 必须符合安全配置工作空间边界
Axis0_MinPosition=0.0
Axis0_MaxPosition=300.0

# Y轴软限位 (mm) - 必须符合安全配置工作空间边界
Axis1_MinPosition=0.0
Axis1_MaxPosition=300.0

# Z轴软限位 (mm)
Axis2_MinPosition=-100.0
Axis2_MaxPosition=100.0

# U轴软限位 (mm) - 旋转轴
Axis3_MinPosition=0.0
Axis3_MaxPosition=360.0

[TestParameters]
# 回零超时时间 (毫秒)
HomingTimeoutMs=30000

# 触发位置容差 (mm)
TriggerToleranceMm=0.1

# CMP补偿采样频率 (Hz)
CMPSampleRateHz=100

# 是否记录测试数据到数据库
DataRecordEnabled=true

# 最大存储测试记录数 (超出后自动清理旧记录)
MaxStoredRecords=10000

# 诊断测试重复定位次数
DiagnosticRepeatabilityCount=5

# 通信质量测试命令数
DiagnosticCommTestCount=1000

[DisplayParameters]
# 位置刷新间隔 (毫秒, 100ms = 10Hz)
PositionRefreshIntervalMs=100

# 图表最大显示点数 (超出后抽样显示)
ChartMaxPoints=1000

# 是否显示详细错误信息
ShowDetailedErrors=true

# 测试历史记录每页显示条数
HistoryPageSize=100

[Permissions]
# 低速点动速度阈值 (mm/s) - 操作员权限可执行的最大速度
OperatorMaxJogSpeed=30.0

# 高速点动需要的最低权限级别 (Operator/Engineer/Admin)
HighSpeedJogPermission=Engineer

# 参数修改需要的最低权限级别
ConfigModifyPermission=Engineer

# 系统诊断需要的最低权限级别
DiagnosticPermission=Operator

[Database]
# SQLite数据库文件路径 (相对于可执行文件)
DatabasePath=data/test_records.db

# 是否启用数据库日志
EnableDatabaseLog=false

# 数据库连接池大小
ConnectionPoolSize=1

[Logging]
# 是否启用测试操作审计日志
EnableAuditLog=true

# 审计日志文件路径
AuditLogPath=logs/hardware_test_audit.log

# 日志级别 (Debug/Info/Warning/Error)
LogLevel=Info
