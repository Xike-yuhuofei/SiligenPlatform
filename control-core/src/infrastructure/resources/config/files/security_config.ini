# 安全配置文件
# 版本: 1.0.0
# 说明: 硬件控制安全加固系统配置

[General]
version=1.0.0
session_timeout_minutes=30
password_min_length=8
max_login_attempts=3
lockout_duration_minutes=15
audit_retention_days=90

[SafetyLimits]
# 运动安全限制 (符合宪法约束)
max_speed_mm_s=10.0
max_acceleration_mm_s2=10.0
max_jerk_mm_s3=100.0
position_error_threshold_mm=0.05
safety_boundary_mm=10.0
workspace_min_x=0.0
workspace_max_x=500.0
workspace_min_y=0.0
workspace_max_y=500.0
estop_response_time_ms=100

[NetworkWhitelist]
# 网络访问控制 (生产环境启用)
enabled=true
allowed_ips=192.168.0.200,192.168.0.201
block_duration_minutes=5
max_failed_attempts=3

[Interlock]
# 硬件安全连锁 (已启用 - X1急停)
enabled=true
# X1引脚急停输入 (DI bit 0, 低电平有效)
emergency_stop_input=0
# 预留其他传感器输入（待硬件连接）
safety_door_input=1
pressure_sensor_input=2
temperature_sensor_input=3
voltage_sensor_input=4
poll_interval_ms=50
pressure_critical_low_mpa=0.4
pressure_warning_low_mpa=0.5
pressure_warning_high_mpa=0.7
pressure_critical_high_mpa=0.8
temperature_critical_low_celsius=5.0
temperature_normal_low_celsius=10.0
temperature_normal_high_celsius=50.0
temperature_critical_high_celsius=55.0
voltage_min_v=220.0
voltage_max_v=240.0
self_test_interval_hours=24
