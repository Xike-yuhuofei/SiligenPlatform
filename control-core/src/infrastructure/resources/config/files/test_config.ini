# MC_LnXY最小测试脚本配置文件
# 格式: key=value

[硬件配置]
# 网络配置 - 固定参数，不可修改
control_card_ip=192.168.0.1
local_ip=192.168.0.200
control_port=0
local_port=0

# 连接参数
connection_timeout_ms=5000

[运动参数]
# 保守的运动参数配置（安全第一）
default_velocity_mm_per_s=10.0
default_acceleration_mm_per_s2=100.0
default_distance_mm=10.0

# 运动限制
max_velocity_mm_per_s=1000.0
max_acceleration_mm_per_s2=5000.0
work_area_x_mm=300.0
work_area_y_mm=300.0

[坐标系配置]
coordinate_system_id=1
x_axis_profile=1
y_axis_profile=2
max_synthetic_velocity=200.0
max_synthetic_acceleration=2000.0
min_uniform_time_ms=10
origin_mode=0

[监控配置]
# 状态监控参数
status_update_interval_ms=100
position_log_threshold_mm=10.0
axis_stable_timeout_ms=5000

[日志配置]
# 日志设置
log_level=INFO
enable_file_logging=true
log_file_path=logs/mc_lnxy_test.log
enable_console_output=true

[诊断配置]
# 错误诊断设置
enable_detailed_diagnostics=true
max_error_history=100
auto_suggestions=true

[安全设置]
# 安全参数
enable_safety_checks=true
emergency_stop_enabled=true
limit_check_enabled=true
parameter_validation_enabled=true