[System]
# 系统基本配置 (System basic configuration)
Version=1.0.0
Mode=Production

[Dispensing]
# 点胶模式: 0=接触式, 1=非接触式, 2=喷射式, 3=位置触发
mode=2
# 压力设置 (kPa)
pressure=50.0
# 流量设置 (ml/min)
flow_rate=1.0
# 点胶时间 (s)
dispensing_time=0.015
# 等待时间 (s)
wait_time=0.05
# 抬起高度 (mm)
retract_height=1.0
# 接近高度 (mm)
approach_height=2.0

# === 工艺控制参数（可选，0/false 表示不启用） ===
# 目标温度 (C) - PUR热熔胶常用工艺 110-140C
temperature_target_c=125.0
# 温度容差 (C)
temperature_tolerance_c=15.0
# 目标黏度 (cP) - 参考 11000+/-3000 cP @120C
viscosity_target_cps=11000.0
# 黏度容差 (%)
viscosity_tolerance_pct=27.0
# 气源要求：干燥
air_dry_required=true
# 气源要求：无油
air_oil_free_required=true
# 回吸启用（防滴/防拉丝）
suck_back_enabled=true
# 回吸时间 (ms)
suck_back_ms=30.0
# 视觉点径反馈启用
vision_feedback_enabled=true
# 点径目标 (mm) - 胶点直径=1mm
dot_diameter_target_mm=1.0
# 点与点边缘间隔 (mm)
dot_edge_gap_mm=1.0
# 点径容差 (mm)
dot_diameter_tolerance_mm=0.2
# 料筒液位下限 (%)
syringe_level_min_pct=20.0

[ValveCoordination]
# 软件时间触发参数 (Software time trigger parameters)
DispensingIntervalMs=1000        ; 点胶间隔(毫秒) Dispensing interval (ms), default: 1000
DispensingDurationMs=15          ; 点胶持续时间(毫秒) Dispensing duration (ms), default: 15
ValveOpenDelayMs=50              ; 阀门开启延迟(毫秒) Valve open delay (ms), default: 50
SafetyTimeoutMs=5000             ; 安全超时(毫秒) Safety timeout (ms), default: 5000

# 多阀门配置 (Multi-valve configuration)
EnabledValves=2                  ; 启用阀门数量(1-4) Enabled valves (1-4), default: 2
Valve1.Channel=0                 ; 阀门1 CMP通道号 Valve 1 CMP channel
Valve2.Channel=1                 ; 阀门2 CMP通道号 Valve 2 CMP channel

# ARC段处理参数 (ARC segment processing parameters)
ArcSegmentationMaxDegree=30      ; ARC拆分最大角度(度) ARC segmentation max angle (degrees), default: 30
ArcChordToleranceMm=0.1          ; 弦高容差(毫米) Chord height tolerance (mm), default: 0.1

[DispenserValve]
# 点胶阀配置(已有,保持兼容) (Dispenser valve config, existing, compatible)
CmpChannel=1
PulseType=0
AbsPositionFlag=1    ; 绝对位置标志 (0=相对位置, 1=绝对位置) - 使用绝对位置
MinCount=1
MaxCount=1000
DefaultCount=100
MinIntervalMs=10
MaxIntervalMs=60000
MinDurationMs=10
MaxDurationMs=5000

[SupplyValve]
# 供胶阀配置(已有,保持兼容) (Supply valve config, existing, compatible)
DoBitIndex=2
DoCardIndex=0
TimeoutMs=5000
FailClosed=true

[Debug]
# 日志配置 (Logging configuration)
# 日志级别: 0=DEBUG, 1=INFO, 2=WARNING, 3=ERROR, 4=CRITICAL
log_level=1
# 日志文件路径 (Log file path)
log_file=logs/siligen_dispenser.log
# 最大日志文件大小 (MB) (Max log file size in MB)
max_log_size=10
# 最大备份文件数量 (Max backup files)
max_log_files=5
# 启用文件日志 (Enable file logging) 0=禁用, 1=启用
enable_file_log=1
# 启用控制台日志 (Enable console logging) 0=禁用, 1=启用
enable_console_log=1

[HttpServer]
# HTTP Server网络配置 (HTTP Server network configuration)
bind_address=0.0.0.0
port=8080

# 超时配置（秒） (Timeout configuration in seconds)
read_timeout=10
write_timeout=10
connection_timeout=10

# 线程配置（0表示使用默认值） (Thread configuration, 0 means use default)
worker_threads=0

# 清理配置 (Cleanup configuration)
cleanup_interval_minutes=10

# 前端配置 (Frontend configuration)
frontend_path=../frontend/dist
enable_frontend=true
