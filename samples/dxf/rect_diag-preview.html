<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DXF轨迹预览 - rect_diag.dxf</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f3ea;
      --panel: rgba(255, 255, 255, 0.88);
      --ink: #14213d;
      --muted: #5b6475;
      --grid: rgba(20, 33, 61, 0.08);
      --frame: rgba(20, 33, 61, 0.16);
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Microsoft YaHei UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(14, 165, 233, 0.18), transparent 28%),
        radial-gradient(circle at bottom right, rgba(217, 119, 6, 0.16), transparent 24%),
        linear-gradient(135deg, #fcfbf7 0%, var(--bg) 100%);
    }
    main {
      display: grid;
      grid-template-columns: minmax(220px, 300px) minmax(0, 1fr);
      gap: 16px;
      padding: 18px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 18px;
      box-shadow: 0 16px 40px rgba(15, 23, 42, 0.12);
      backdrop-filter: blur(12px);
    }
    .summary {
      padding: 20px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 1.35rem;
      line-height: 1.3;
    }
    .meta {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }
    .card {
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(20, 33, 61, 0.08);
    }
    .label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .value {
      font-size: 1.12rem;
      font-weight: 600;
    }
    .canvas {
      position: relative;
      overflow: hidden;
      min-height: 78vh;
      padding: 10px;
    }
    svg {
      width: 100%;
      height: 100%;
      min-height: 76vh;
      border-radius: 16px;
      background:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px),
        #fffdf7;
      background-size: 24px 24px;
      border: 1px solid var(--frame);
    }
    .trace {
      fill: none;
      stroke: var(--trace-color, #0f766e);
      stroke-width: 1.2;
      stroke-linecap: round;
      stroke-linejoin: round;
      vector-effect: non-scaling-stroke;
    }
    .footer {
      margin-top: 16px;
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 1.5;
    }
    @media (max-width: 960px) {
      main {
        grid-template-columns: 1fr;
      }
      .canvas {
        min-height: 60vh;
      }
      svg {
        min-height: 58vh;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="panel summary">
      <h1>DXF轨迹预览 - rect_diag.dxf</h1>
      <div class="meta">
        <div class="card">
          <span class="label">总长度</span>
          <span class="value">541.42 mm</span>
        </div>
        <div class="card">
          <span class="label">预估时间</span>
          <span class="value">54.14 s</span>
        </div>
        <div class="card">
          <span class="label">包围盒</span>
          <span class="value">100.00 × 100.00 mm</span>
        </div>
        <div class="card">
          <span class="label">几何对象</span>
          <span class="value">5</span>
        </div>
      </div>
      <div class="footer">
        该预览由 engineering-data 本地生成，展示责任由 hmi-client 承接。
      </div>
    </section>
    <section class="panel canvas">
      <svg viewBox="0 0 110.000 110.000" role="img" aria-label="DXF轨迹预览 - rect_diag.dxf">
        <g>
          <path d="M 5.000 105.000 L 105.000 105.000" class="trace" style="--trace-color:#0f766e" /><path d="M 105.000 105.000 L 105.000 5.000" class="trace" style="--trace-color:#0f766e" /><path d="M 105.000 5.000 L 5.000 5.000" class="trace" style="--trace-color:#0f766e" /><path d="M 5.000 5.000 L 5.000 105.000" class="trace" style="--trace-color:#0f766e" /><path d="M 5.000 105.000 L 105.000 5.000" class="trace" style="--trace-color:#0f766e" />
          
        </g>
      </svg>
    </section>
  </main>
</body>
</html>
