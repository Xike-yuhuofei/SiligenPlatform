[Debug]
# 日志级别: 0=DEBUG, 1=INFO, 2=WARNING, 3=ERROR, 4=CRITICAL
# 数字越大，日志越少（仅记录高优先级）
log_level=1

# 日志文件路径（相对于可执行文件目录）
log_file=logs/siligen_dispenser.log

# 最大日志文件大小 (MB) - 超过后自动轮转
max_log_size=10

# 保留日志文件数量（轮转备份）
max_log_files=5

# 启用文件日志 (0=禁用, 1=启用)
enable_file_log=1

# 启用控制台日志 (0=禁用, 1=启用)
enable_console_log=1

[Safety]
# 紧急停止启用
emergency_stop_enabled=true
# 软限位检查启用
soft_limits_enabled=true
# 运动前位置检查启用
position_check_enabled=true
# 连接超时检查 (ms)
connection_timeout_check=1000
# 状态监控间隔 (ms)
status_monitor_interval=100

[Interlock]
# 后端互锁权威配置。当前机型: X7 为急停输入，无安全门输入。
enabled=true
# 通用输入位索引: 0=X0 ... 7=X7
emergency_stop_input=7
# 当前机型现场确认：急停按钮复位时 X7 为高电平，因此按高电平=正常、低电平=触发 之外的反向极性解释。
emergency_stop_active_low=false
# -1 表示当前机型未定义该互锁输入
safety_door_input=-1
# 轮询间隔 (ms)
poll_interval_ms=50

[ValveDispenser]
# 点胶阀CMP通道配置（与[CMP]段保持一致）
cmp_channel=1
# 脉冲类型 (0=脉冲, 1=电平)
pulse_type=0
# 最小参数验证范围
min_count=1
max_count=1000
min_interval_ms=10
max_interval_ms=60000
min_duration_ms=10
max_duration_ms=5000
# 绝对位置标志 (0=相对, 1=绝对) - DXF点胶使用绝对位置
abs_position_flag=1

[ValveSupply]
# 供胶阀DO输出配置
# DO位索引: 0=Y0, 1=Y1, 2=Y2, 3=Y3
do_bit_index=2
# 卡索引 (0=主卡)
do_card_index=0
# 超时保护 (ms)
timeout_ms=5000
# 失败安全模式: fail_closed=true (失败时关闭)
fail_closed=true
