# Siligen 工业点胶机配置文件
# 注意：修改配置后需要重启程序才能生效

[Dispensing]
# 点胶模式: 0=接触式, 1=非接触式, 2=喷射式, 3=位置触发
mode=2
# 压力设置 (kPa)
pressure=50.0
# 流量设置 (ml/min)
flow_rate=1.0
# 点胶时间 (s)
dispensing_time=0.015
# 等待时间 (s)
wait_time=0.05
# 抬起高度 (mm)
retract_height=1.0
# 接近高度 (mm)
approach_height=2.0
# 预点胶延迟 (s)
pre_dispensing_delay=0.02
# 后点胶延迟 (s)
post_dispensing_delay=0.02
# 位置触发启用
position_trigger_enabled=false
# 触发策略: baseline/segmented/subsegmented/cruise_only
strategy=subsegmented
# 子段数量
subsegment_count=8
# 仅匀速段点胶
dispense_only_cruise=false
# 起胶提前补偿 (ms)
open_comp_ms=0
# 收胶滞后补偿 (ms)
close_comp_ms=0
# 回吸启用（补偿级别，可与回吸工艺配合）
retract_enabled=false
# 拐角胶量缩放系数
corner_pulse_scale=1.0
# 曲率限速系数
curvature_speed_factor=0.8
# 起始速度系数
start_speed_factor=0.5
# 结束速度系数
end_speed_factor=0.5
# 拐角速度系数
corner_speed_factor=0.6
# 快速段速度系数
rapid_speed_factor=1.0

# === 工艺控制参数（可选，0/false 表示不启用） ===
# 目标温度 (C) - PUR热熔胶常用工艺 110-140C
temperature_target_c=125.0
# 温度容差 (C)
temperature_tolerance_c=15.0
# 目标黏度 (cP) - 参考 11000+/-3000 cP @120C
viscosity_target_cps=11000.0
# 黏度容差 (%)
viscosity_tolerance_pct=27.0
# 气源要求：干燥
air_dry_required=true
# 气源要求：无油
air_oil_free_required=true
# 回吸启用（防滴/防拉丝）
suck_back_enabled=true
# 回吸时间 (ms)
suck_back_ms=30.0
# 视觉点径反馈启用
vision_feedback_enabled=true
# 点径目标 (mm) - 胶点直径=1mm
dot_diameter_target_mm=1.0
# 点与点边缘间隔 (mm)
dot_edge_gap_mm=2.0
# 点径容差 (mm)
dot_diameter_tolerance_mm=0.2
# 料筒液位下限 (%)
syringe_level_min_pct=20.0

[Machine]
# 工作区域宽度 (mm)
work_area_width=480.0
# 工作区域高度 (mm)
work_area_height=480.0
# Z轴行程 (mm)
z_axis_range=100.0
# 最大速度 (mm/s) - Industry Practice: 300-800mm/s
max_speed=300.0
# 最大加速度 (mm/s²) - Industry Practice: 500-2000mm/s²
max_acceleration=1000.0
# 定位精度 (mm)
positioning_tolerance=0.1
# 每毫米脉冲数 (已校准)
pulse_per_mm=200
# 电机脉冲数/圈
motor_pulses_per_rev=10000
# 导程 (mm/圈)
lead_screw_pitch=50.0

# 软限位设置
x_min=0.0
x_max=480.0
y_min=0.0
y_max=480.0
z_min=-50.0
z_max=50.0

[ValveTiming]
# 开启延时 (s)
open_delay=0.001
# 关闭延时 (s)
close_delay=0.001
# 最小开启时间 (s)
min_on_time=0.01
# 最大开启时间 (s)
max_on_time=10.0
# 阀门响应时间 (s)
valve_response_time=0.005

[ValveCoordination]
# 点胶间隔 (ms)
DispensingIntervalMs=100
# 点胶持续时间 (ms)
DispensingDurationMs=15
# 阀门开启延迟 (ms)
ValveOpenDelayMs=0
# 阀门响应时间 (ms)
ValveResponseMs=5
# 安全超时 (ms)
SafetyTimeoutMs=5000
# 视觉裕量 (ms)
VisualMarginMs=10
# 最小触发间隔 (ms)
MinIntervalMs=10
# 预缓冲点数
PrebufferPoints=50
# 启用阀门数量
EnabledValves=1
# ARC拆分最大角度(度)
ArcSegmentationMaxDegree=30
# 弦高容差(mm)
ArcChordToleranceMm=0.1

[CMP]
# CMP通道 (1-4)
cmp_channel=1
# 信号类型: 0=脉冲, 1=电平(已禁用)
signal_type=0
# 触发模式: 0=单点, 1=区间, 2=序列, 3=重复
trigger_mode=0
# 脉冲宽度 (μs)
pulse_width_us=2000
# 延时时间 (μs)
delay_time_us=0
# 编码器编号（软件触发方案已废弃）
encoder_num=1
# 绝对位置标志 (0=相对, 1=绝对) - DXF点胶使用绝对位置
abs_position_flag=1

# === 软件触发方案参数 ===
# 触发方法: firmware_timed=固件级定时触发(开环,不跟随速度波动), hardware=基于编码器位置(闭环)
trigger_method=firmware_timed
# 脉冲时序精度 (ms) - 固件生成精度
timing_precision_ms=1
# 启用触发日志 (0=关闭, 1=开启)
enable_trigger_log=1
# 编码器补偿 (0=禁用, 1=启用) - 软件方案应设为0
enable_compensation=0
# 触发位置容差 (mm)
trigger_position_tolerance=0.05
# 预期精度 (mm) - 软件方案: ±0.02-0.05mm
expected_accuracy_mm=0.02

[Network]
# 控制卡IP地址
control_card_ip=192.168.0.1
# 本机IP地址
local_ip=192.168.0.200
# 控制卡端口 (0=系统自动分配，推荐)
control_card_port=0
# 本机端口 (0=系统自动分配，推荐)
local_port=0
# 连接超时 (ms)
timeout_ms=5000

[DXF]
# 默认DXF文件路径（CLI dxf-plan / dxf-dispense）
dxf_file_path=D:\Projects\SiligenSuite\examples\dxf\rect_diag.dxf
# DXF坐标平移 (mm)
offset_x=0.0
offset_y=0.0

[DXFPreprocess]
# DXF预处理参数（Python/ezdxf -> .pb）
# 是否按DXF单位归一化为mm
normalize_units=true
# 是否严格限制为R12及核心实体（false=兼容非R12并告警）
strict_r12=false
# 是否将SPLINE近似为折线
approx_splines=false
# 是否启用坐标吸附
snap_enabled=false
# 是否启用线段密化
densify_enabled=false
# 是否启用最小段长裁剪
min_seg_enabled=false
# SPLINE采样点数（geomdl）
spline_samples=64
# SPLINE最大步长(mm, 0=自动)
spline_max_step=0.0
# 弦高容差(mm, ezdxf flatten)
chordal=0.005
# 最大段长(mm, 0=不限制)
max_seg=0.0
# 点吸附阈值(mm)
snap=0.0
# 角度阈值(弧度, 0=不限制)
angular=0.0
# 最小段长(mm)
min_seg=0.0

[DXFTrajectory]
# Python解释器
python=python
# 轨迹生成脚本路径
script=D:\Projects\SiligenSuite\packages\engineering-data\scripts\path_to_trajectory.py

[VelocityTrace]
# 启用DXF执行速度采样 (true/false)
enabled=true
# 采样间隔 (ms)
interval_ms=50
# 输出路径（目录或完整文件路径）
output_path=D:\Projects\SiligenSuite\logs\velocity_trace

[Diagnostics]
# 深度诊断日志开关（true/false）
deep_tcp_logging=true
deep_motion_logging=false
deep_hardware_logging=false
# 点动/停止后延迟采样 (ms)
snapshot_delay_ms=120
snapshot_after_stop_ms=60
# TCP负载日志最大字符数
tcp_payload_max_chars=512

[Hardware]
# 硬件模式: Real=使用真实MultiCard硬件, Mock=使用Mock硬件进行测试
# Hardware mode: Real=actual MultiCard hardware, Mock=mock hardware for testing
mode=Real
# 每毫米脉冲数 (必须与 [Machine] 段的 pulse_per_mm 保持一致)
# 计算: motor_pulses_per_rev / lead_screw_pitch = 10000 / 50 = 200
pulse_per_mm=200
max_velocity_mm_s=500.0
max_acceleration_mm_s2=2000.0
max_deceleration_mm_s2=2000.0
position_tolerance_mm=0.1
soft_limit_positive_mm=480.0
soft_limit_negative_mm=0.0
response_timeout_ms=5000
motion_timeout_ms=30000
num_axes=2
axis1_encoder_enabled=false
axis2_encoder_enabled=false

# === 回零配置参数 ===
# 每个轴都有独立的回零配置段，支持不同的回零参数

[Homing_Axis1]
# 回零模式: 0=限位回零, 1=HOME信号回零, 2=HOME+Z相信号回零, 3=索引回零
mode=1
# 回零方向: 0=负向, 1=正向
direction=0
# 速度参数 (mm/s)
rapid_velocity=10.0
locate_velocity=5.0
index_velocity=2.0
# 加速度参数 (mm/s²)
acceleration=500.0
deceleration=500.0
jerk=2000.0
# 距离参数 (mm)
offset=0.0
search_distance=485.0
escape_distance=5.0
# 时间参数 (ms)
timeout_ms=30000
settle_time_ms=500
# 其他参数
retry_count=0
enable_escape=true
enable_limit_switch=true
enable_index=false
home_backoff_enabled=false
home_input_source=3
home_input_bit=-1
home_active_low=false
home_debounce_ms=3
escape_velocity=5.0
escape_timeout_ms=3000
escape_max_attempts=2

