[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "engineering-data"
version = "0.1.0"
description = "Siligen canonical engineering data preprocessing package"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "ezdxf>=1.3.0",
  "protobuf>=4.25.0",
  "geomdl>=5.3.1",
  "ruckig>=0.12.0",
]

[project.scripts]
engineering-data-dxf-to-pb = "engineering_data.cli.dxf_to_pb:main"
engineering-data-path-to-trajectory = "engineering_data.cli.path_to_trajectory:main"
engineering-data-export-simulation-input = "engineering_data.cli.export_simulation_input:main"
engineering-data-generate-preview = "engineering_data.cli.generate_preview:main"
dxf-to-pb = "engineering_data.cli.dxf_to_pb:main"
path-to-trajectory = "engineering_data.cli.path_to_trajectory:main"
export-simulation-input = "engineering_data.cli.export_simulation_input:main"
generate-dxf-preview = "engineering_data.cli.generate_preview:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
