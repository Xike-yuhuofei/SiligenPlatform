# SiligenSuite speckit extension hooks
#
# 这是一份最小可用模板：
# 1. 文件结构与 speckit 技能约定兼容
# 2. 默认不启用任何 hook，不引入额外副作用
# 3. 后续如需接入具体命令，可在对应列表中追加条目
#
# 项目约束提醒：
# - 运行项目内技能前，应先执行 scripts/validation/resolve-workflow-context.ps1
# - 高风险命令应通过 scripts/validation/invoke-guarded-command.ps1 执行
# - 仅在确认 HookExecutor 支持相应命令名后，再把 hook 改为 mandatory/automatic
#
# 参考条目结构：
# - extension: workflow-context
#   enabled: true
#   optional: true
#   command: ss-scope-clarify
#   description: 在进入 speckit 阶段前先统一 workflow context
#   prompt: 先解析 ticket / branchSafe / timestamp，再继续当前阶段
#   condition:

version: 1

hooks:
  before_specify: []
  after_specify: []

  before_plan: []
  after_plan: []

  before_tasks: []
  after_tasks: []

  before_implement: []
  after_implement: []
