name: Strict Native Gate

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - labeled
      - unlabeled
  merge_group:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_native:
        description: Force the native build/test job even when path/label classification does not require it.
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read
  pull-requests: read

jobs:
  classify-native-requirement:
    name: Classify Native Requirement
    runs-on: windows-latest
    outputs:
      requires_native: ${{ steps.classify.outputs.requires_native }}
      reason: ${{ steps.classify.outputs.reason }}
      trusted_native_runner: ${{ steps.classify.outputs.trusted_native_runner }}
      trust_reason: ${{ steps.classify.outputs.trust_reason }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classify native-sensitive changes
        id: classify
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha || '' }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha || github.sha }}
          FORCE_NATIVE: ${{ inputs.force_native || 'false' }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          $ErrorActionPreference = "Stop"
          $classificationPath = "tests\reports\github-actions\strict-native-gate\classification\classification.json"
          $classificationArgs = @(
            "-Mode",
            "native",
            "-OutputPath",
            $classificationPath,
            "-BaseSha",
            $env:BASE_SHA,
            "-HeadSha",
            $env:HEAD_SHA,
            "-EventName",
            $env:EVENT_NAME
          )
          if ($env:FORCE_NATIVE -eq "true") {
            $classificationArgs += "-ForceNative"
          }
          .\scripts\validation\classify-change.ps1 @classificationArgs

          $event = Get-Content -Raw -Path $env:GITHUB_EVENT_PATH | ConvertFrom-Json
          $trustedNativeRunner = $false
          $trustReason = ""
          if ($env:EVENT_NAME -eq "pull_request") {
            $headRepository = ""
            if ($null -ne $event.pull_request -and $null -ne $event.pull_request.head -and $null -ne $event.pull_request.head.repo) {
              $headRepository = [string]$event.pull_request.head.repo.full_name
            }
            if ($headRepository -eq $env:GITHUB_REPOSITORY) {
              $trustedNativeRunner = $true
              $trustReason = "same-repository pull request"
            } else {
              $trustReason = "forked pull request cannot run self-hosted native build"
            }
          } elseif ($env:EVENT_NAME -eq "merge_group") {
            $trustedNativeRunner = $true
            $trustReason = "merge_group queue"
          } elseif ($env:EVENT_NAME -eq "workflow_dispatch") {
            $trustedNativeRunner = $true
            $trustReason = "maintainer-controlled workflow_dispatch"
          } else {
            $trustReason = "unsupported event for self-hosted native build"
          }
          $trustedNativeRunnerText = if ($trustedNativeRunner) { "true" } else { "false" }

          "trusted_native_runner=$trustedNativeRunnerText" >> $env:GITHUB_OUTPUT
          "trust_reason=$trustReason" >> $env:GITHUB_OUTPUT

          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- trusted_native_runner: ``$trustedNativeRunnerText``"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- trust_reason: ``$trustReason``"

      - name: Upload native classification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: strict-native-classification
          path: tests/reports/github-actions/strict-native-gate/classification
          if-no-files-found: error

  run-native:
    name: Run Native Build And Test
    needs: classify-native-requirement
    if: needs.classify-native-requirement.outputs.requires_native == 'true' && needs.classify-native-requirement.outputs.trusted_native_runner == 'true'
    runs-on: [self-hosted, windows, build]
    timeout-minutes: 120
    concurrency:
      group: strict-native-runner
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run full offline native gate
        shell: pwsh
        env:
          FORCE_NATIVE: ${{ inputs.force_native || 'false' }}
        run: |
          $gateArgs = @(
            "-Gate",
            "native",
            "-ReportRoot",
            "tests\reports\github-actions\strict-native-gate"
          )
          if ($env:FORCE_NATIVE -eq "true") {
            $gateArgs += "-ForceNative"
          }
          .\scripts\validation\invoke-gate.ps1 @gateArgs

      - name: Upload strict native evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: strict-native-gate-evidence
          path: tests/reports/github-actions/strict-native-gate
          if-no-files-found: error

  strict-native-gate:
    name: Strict Native Gate
    needs:
      - classify-native-requirement
      - run-native
    if: always()
    runs-on: windows-latest
    steps:
      - name: Summarize required native status
        shell: pwsh
        env:
          CLASSIFY_RESULT: ${{ needs.classify-native-requirement.result }}
          REQUIRES_NATIVE: ${{ needs.classify-native-requirement.outputs.requires_native }}
          CLASSIFICATION_REASON: ${{ needs.classify-native-requirement.outputs.reason }}
          TRUSTED_NATIVE_RUNNER: ${{ needs.classify-native-requirement.outputs.trusted_native_runner }}
          TRUST_REASON: ${{ needs.classify-native-requirement.outputs.trust_reason }}
          NATIVE_RESULT: ${{ needs.run-native.result }}
        run: |
          $ErrorActionPreference = "Stop"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## Strict Native Gate"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- classify_result: ``$env:CLASSIFY_RESULT``"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- requires_native: ``$env:REQUIRES_NATIVE``"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- reason: ``$env:CLASSIFICATION_REASON``"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- trusted_native_runner: ``$env:TRUSTED_NATIVE_RUNNER``"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- trust_reason: ``$env:TRUST_REASON``"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- run_native_result: ``$env:NATIVE_RESULT``"

          if ($env:CLASSIFY_RESULT -ne "success") {
            throw "Strict Native Gate classification failed with result '$env:CLASSIFY_RESULT'."
          }

          if ([string]::IsNullOrWhiteSpace($env:REQUIRES_NATIVE)) {
            throw "Strict Native Gate classification did not publish requires_native."
          }

          if ($env:REQUIRES_NATIVE -ne "true") {
            Write-Output "Strict Native Gate not required for this PR."
            exit 0
          }

          if ($env:TRUSTED_NATIVE_RUNNER -ne "true") {
            throw "Strict Native Gate required but self-hosted native build runner is not trusted for this event: $env:TRUST_REASON."
          }

          if ($env:NATIVE_RESULT -ne "success") {
            throw "Strict Native Gate required but native build/test result was '$env:NATIVE_RESULT'."
          }

          Write-Output "Strict Native Gate passed."
