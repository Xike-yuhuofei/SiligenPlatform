name: Strict HIL Gate

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - labeled
      - unlabeled
  merge_group:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_hil:
        description: Force the HIL job even when path/label classification does not require it.
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read
  pull-requests: read

jobs:
  classify-hil-requirement:
    name: Classify HIL Requirement
    runs-on: windows-latest
    outputs:
      requires_hil: ${{ steps.classify.outputs.requires_hil }}
      reason: ${{ steps.classify.outputs.reason }}
      trusted_hil_runner: ${{ steps.classify.outputs.trusted_hil_runner }}
      trust_reason: ${{ steps.classify.outputs.trust_reason }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classify hardware-sensitive changes
        id: classify
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha || '' }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha || github.sha }}
          FORCE_HIL: ${{ inputs.force_hil || 'false' }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          $ErrorActionPreference = "Stop"
          $classificationPath = "tests\reports\github-actions\strict-hil-gate\classification\classification.json"
          if ($env:FORCE_HIL -eq "true") {
            .\scripts\validation\classify-change.ps1 `
              -Mode hil `
              -OutputPath $classificationPath `
              -BaseSha $env:BASE_SHA `
              -HeadSha $env:HEAD_SHA `
              -EventName $env:EVENT_NAME `
              -ForceHil
          } else {
            .\scripts\validation\classify-change.ps1 `
              -Mode hil `
              -OutputPath $classificationPath `
              -BaseSha $env:BASE_SHA `
              -HeadSha $env:HEAD_SHA `
              -EventName $env:EVENT_NAME
          }

          $event = Get-Content -Raw -Path $env:GITHUB_EVENT_PATH | ConvertFrom-Json
          $trustedHilRunner = $false
          $trustReason = ""
          if ($env:EVENT_NAME -eq "pull_request") {
            $headRepository = ""
            if ($null -ne $event.pull_request -and $null -ne $event.pull_request.head -and $null -ne $event.pull_request.head.repo) {
              $headRepository = [string]$event.pull_request.head.repo.full_name
            }
            if ($headRepository -eq $env:GITHUB_REPOSITORY) {
              $trustedHilRunner = $true
              $trustReason = "same-repository pull request"
            } else {
              $trustReason = "forked pull request cannot run self-hosted HIL"
            }
          } elseif ($env:EVENT_NAME -eq "merge_group") {
            $trustedHilRunner = $true
            $trustReason = "merge_group queue"
          } elseif ($env:EVENT_NAME -eq "workflow_dispatch") {
            $trustedHilRunner = $true
            $trustReason = "maintainer-controlled workflow_dispatch"
          } else {
            $trustReason = "unsupported event for self-hosted HIL"
          }
          $trustedHilRunnerText = if ($trustedHilRunner) { "true" } else { "false" }

          "trusted_hil_runner=$trustedHilRunnerText" >> $env:GITHUB_OUTPUT
          "trust_reason=$trustReason" >> $env:GITHUB_OUTPUT

          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- trusted_hil_runner: ``$trustedHilRunnerText``"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- trust_reason: ``$trustReason``"

      - name: Upload HIL classification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: strict-hil-classification
          path: tests/reports/github-actions/strict-hil-gate/classification
          if-no-files-found: error

  run-hil:
    name: Run Controlled HIL
    needs: classify-hil-requirement
    if: needs.classify-hil-requirement.outputs.requires_hil == 'true' && needs.classify-hil-requirement.outputs.trusted_hil_runner == 'true'
    runs-on: [self-hosted, windows, hil]
    timeout-minutes: 120
    concurrency:
      group: strict-hil-runner
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run controlled HIL gate
        shell: pwsh
        env:
          FORCE_HIL: ${{ inputs.force_hil || 'false' }}
        run: |
          if ($env:FORCE_HIL -eq "true") {
            .\scripts\validation\invoke-gate.ps1 `
              -Gate hil `
              -ReportRoot tests\reports\github-actions\strict-hil-gate `
              -ForceHil
          } else {
            .\scripts\validation\invoke-gate.ps1 `
              -Gate hil `
              -ReportRoot tests\reports\github-actions\strict-hil-gate
          }

      - name: Upload strict HIL evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: strict-hil-gate-evidence
          path: tests/reports/github-actions/strict-hil-gate
          if-no-files-found: error

  strict-hil-gate:
    name: Strict HIL Gate
    needs:
      - classify-hil-requirement
      - run-hil
    if: always()
    runs-on: windows-latest
    steps:
      - name: Summarize required HIL status
        shell: pwsh
        env:
          CLASSIFY_RESULT: ${{ needs.classify-hil-requirement.result }}
          REQUIRES_HIL: ${{ needs.classify-hil-requirement.outputs.requires_hil }}
          CLASSIFICATION_REASON: ${{ needs.classify-hil-requirement.outputs.reason }}
          TRUSTED_HIL_RUNNER: ${{ needs.classify-hil-requirement.outputs.trusted_hil_runner }}
          TRUST_REASON: ${{ needs.classify-hil-requirement.outputs.trust_reason }}
          HIL_RESULT: ${{ needs.run-hil.result }}
        run: |
          $ErrorActionPreference = "Stop"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## Strict HIL Gate"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- classify_result: ``$env:CLASSIFY_RESULT``"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- requires_hil: ``$env:REQUIRES_HIL``"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- reason: ``$env:CLASSIFICATION_REASON``"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- trusted_hil_runner: ``$env:TRUSTED_HIL_RUNNER``"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- trust_reason: ``$env:TRUST_REASON``"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- run_hil_result: ``$env:HIL_RESULT``"

          if ($env:CLASSIFY_RESULT -ne "success") {
            throw "Strict HIL Gate classification failed with result '$env:CLASSIFY_RESULT'."
          }

          if ([string]::IsNullOrWhiteSpace($env:REQUIRES_HIL)) {
            throw "Strict HIL Gate classification did not publish requires_hil."
          }

          if ($env:REQUIRES_HIL -ne "true") {
            Write-Output "Strict HIL Gate not required for this PR."
            exit 0
          }

          if ($env:TRUSTED_HIL_RUNNER -ne "true") {
            throw "Strict HIL Gate required but self-hosted HIL runner is not trusted for this event: $env:TRUST_REASON."
          }

          if ($env:HIL_RESULT -ne "success") {
            throw "Strict HIL Gate required but controlled HIL result was '$env:HIL_RESULT'."
          }

          Write-Output "Strict HIL Gate passed."
