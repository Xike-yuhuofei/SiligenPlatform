name: Strict PR Gate

on:
  pull_request:
    branches:
      - main
  merge_group:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: strict-pr-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  strict-pr-gate:
    name: Strict PR Gate
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install validation dependencies
        shell: pwsh
        run: |
          .\scripts\validation\install-python-deps.ps1

      - name: Assert HMI formal gateway launch contract
        shell: pwsh
        run: |
          .\scripts\validation\assert-hmi-formal-gateway-launch-contract.ps1

      - name: Run legacy exit gate
        shell: pwsh
        run: |
          .\legacy-exit-check.ps1 `
            -Profile CI `
            -ReportDir tests\reports\github-actions\strict-pr-gate\legacy-exit

      - name: Run Semgrep architecture gate
        shell: pwsh
        run: |
          .\scripts\validation\invoke-semgrep.ps1 `
            -ReportDir tests\reports\github-actions\strict-pr-gate\semgrep

      - name: Run Import Linter gate
        shell: pwsh
        run: |
          .\scripts\validation\invoke-import-linter.ps1 `
            -ReportDir tests\reports\github-actions\strict-pr-gate\import-linter

      - name: Upload strict gate evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: strict-pr-gate-evidence
          path: tests/reports/github-actions/strict-pr-gate
          if-no-files-found: error
