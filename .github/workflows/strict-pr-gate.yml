name: Strict PR Gate

on:
  pull_request:
    branches:
      - main
  merge_group:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: strict-pr-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  strict-pr-gate:
    name: Strict PR Gate
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run strict PR gate
        shell: pwsh
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha || '' }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha || github.sha }}
        run: |
          .\scripts\validation\invoke-gate.ps1 `
            -Gate pr `
            -ReportRoot tests\reports\github-actions\strict-pr-gate `
            -BaseSha $env:BASE_SHA `
            -HeadSha $env:HEAD_SHA

      - name: Upload strict gate evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: strict-pr-gate-evidence
          path: tests/reports/github-actions/strict-pr-gate
          if-no-files-found: error
