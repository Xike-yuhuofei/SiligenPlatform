name: workspace-gate

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  legacy-exit-gates:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run legacy exit gates
        shell: pwsh
        run: .\legacy-exit-check.ps1 -Profile CI -ReportDir "integration\reports\ci\legacy-exit"

      - name: Upload legacy exit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: legacy-exit-gates
          path: integration/reports/ci/legacy-exit/

  protocol-drift-precheck:
    needs: legacy-exit-gates
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run protocol drift precheck
        shell: pwsh
        run: python .\packages\application-contracts\tests\test_protocol_compatibility.py

  validation:
    needs:
      - legacy-exit-gates
      - protocol-drift-precheck
    runs-on: windows-latest
    env:
      SILIGEN_CONTROL_APPS_BUILD_ROOT: ${{ github.workspace }}\build\control-apps
    strategy:
      fail-fast: false
      matrix:
        suite:
          - apps
          - packages
          - integration
          - protocol-compatibility
          - simulation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install workspace Python dependencies
        shell: pwsh
        run: .\tools\scripts\install-python-deps.ps1

      - name: Build suite prerequisites
        shell: pwsh
        run: .\build.ps1 -Profile CI -Suite ${{ matrix.suite }}

      - name: Run suite validation
        shell: pwsh
        run: .\test.ps1 -Profile CI -Suite ${{ matrix.suite }} -ReportDir "integration\reports\ci\${{ matrix.suite }}" -FailOnKnownFailure

      - name: Upload validation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workspace-validation-${{ matrix.suite }}
          path: integration/reports/ci/${{ matrix.suite }}/
