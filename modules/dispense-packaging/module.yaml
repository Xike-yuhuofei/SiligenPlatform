module_id: M8
module_name: dispense-packaging
owner_artifact: ExecutionPackage
group: planning
target_root: modules/dispense-packaging
allowed_dependencies:
  - motion-planning/contracts
  - process-path/contracts
  - process-planning/contracts
  - runtime-execution/contracts
  - shared
uniform_skeleton_ready: true
notes: >
  M8 canonical owner 公开产物是 ExecutionPackage、PlanningArtifactExportRequest、
  AuthorityTriggerLayout、TriggerPlan、DispensingPlan；Workflow-facing public assembly
  seam 中的 PlanningArtifactExportRequest 仅允许以
  domain/dispensing/contracts canonical namespace 暴露，不再保留 application
  namespace alias；
  seam 固定为 AuthorityPreviewAssemblyService、ExecutionAssemblyService 与
  WorkflowPlanningAssemblyOperationsProvider，公开输入/输出统一使用 workflow DTO；
  application/include/application/services/dispensing/WorkflowPlanningAssemblyTypes.h
  当前是 canonical DTO owner。workflow/application 中同名头仅允许作为 compat
  forwarder。PlanningAssemblyServices.cpp 当前承接 public assembly entry；internal stage
  类型与 concrete planning 已回收到
  application/services/dispensing/PlanningAssemblyServices.cpp 与
  PlanningAssembly*.cpp 私有编译单元，不再保留 PlanningAssemblyTypes.h 公开头。
  DispensingExecutionPlan 保留为 M8 owner backing type；运行期
  planning artifact export 的 port/result contract canonical owner 位于
  runtime-execution/application；
  overrides/params/options/report 与 GuardDecision/MachineMode/JobExecutionMode/
  ProcessOutputPolicy 的 canonical owner 位于 runtime-execution/contracts/runtime。
  domain_dispensing 当前只允许作为 thin owner/core header surface 暴露；
  runtime/motion fat include 依赖仅允许经
  domain_dispensing_planning_residual_headers 供 residual/internal target 私有消费；
  legacy DXF planning concrete 不得继续挂在 domain live target，当前仅允许存在于
  tests/CMakeLists.txt 定义的 planning_legacy_dxf_quarantine_support；
  UnifiedTrajectoryPlannerService wrapper 已删除，残余 DXF 主线仅在
  DispensingPlannerService.cpp 内通过私有 helper 编排 ProcessPathFacade /
  MotionPlanningFacade；其原行为证据改由 process-path owner tests 承接；
  PathOptimizationStrategy 已删除，轮廓重排 / 最近邻 / 2-Opt 优化残余当前仅收敛于
  ContourOptimizationService.cpp 这一条 quarantine seam；
  execution/process-control/valve/CMP concrete 已全部迁入 runtime-execution owner 并从 M8 物理删除；
  不得恢复 WorkflowDispensingProcessOperationsProvider、不得恢复 raw workflow include root /
  raw runtime contract include root 暴露，也不得把 valve/process-control/CMP residual
  误记为 canonical public owner surface。DispenseTimingPlan 为历史命名残留，不再新增 live 类型。
