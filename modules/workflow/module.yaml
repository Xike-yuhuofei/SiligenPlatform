module_id: M0
module_name: workflow
owner_artifact: WorkflowRun
group: workflow
target_root: modules/workflow
allowed_dependencies:
  - shared
  - */contracts
uniform_skeleton_ready: true
notes: >
  workflow/contracts 是当前稳定的 M0 触发契约面；recipe management
  surface 已退役并删除，跨模块事件发布契约已迁到
  shared/contracts/runtime/include/runtime/contracts/system/IEventPublisherPort.h。
  任何 recipe owner、serializer、CRUD/import-export surface 都不得回流到
  workflow 或其他 live 模块。
  modules/workflow 当前已收口为 M0 canonical bundle：module root 只暴露
  workflow/contracts、workflow/domain 与 workflow/adapters public surfaces，
  并显式纳入 application/services/runtime skeleton 自校验。domain/domain、
  domain/include/domain、motion-core 与 application 下 planning/execution/recovery
  residue 已退出；workflow/tests 也只保留 M0 source-bearing canonical tests。
  services 为 M0 lifecycle/rollback/archive/projection skeleton；examples、
  tests/unit、tests/integration 与 tests/regression 仅保留登记面或空壳入口。
