module_id: B08
module_name: recipe-lifecycle
owner_artifact: Recipe
group: application
target_root: modules/recipe-lifecycle
allowed_dependencies:
  - shared
uniform_skeleton_ready: false
notes: >
  recipe lifecycle canonical owner 负责 recipe aggregates、ports、validation/activation、
  CRUD/publish/activate/compare/import/export use cases 与 JSON serialization；
  runtime-service 只负责 file repository / schema provider 等 app-local runtime wiring。
  该模块对应 project-chain-standard-v1 的 B08 配方生命周期链，不属于 S05 正式
  M0-M11 一级模块表；本轮仅按仓库内局部 canonical owner 进行目录治理。
