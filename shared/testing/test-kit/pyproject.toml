[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "test-kit"
version = "0.1.0"
description = "Siligen workspace validation runner and reporting toolkit"
readme = "README.md"
requires-python = ">=3.11"

[project.scripts]
siligen-workspace-validation = "test_kit.workspace_validation:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
