syntax = "proto3";

package siligen.dxf;

option optimize_for = LITE_RUNTIME;

message Point2D {
  double x = 1;
  double y = 2;
}

enum PrimitiveType {
  PRIMITIVE_LINE = 0;
  PRIMITIVE_ARC = 1;
  PRIMITIVE_SPLINE = 2;
  PRIMITIVE_CIRCLE = 3;
  PRIMITIVE_ELLIPSE = 4;
  PRIMITIVE_POINT = 5;
  PRIMITIVE_CONTOUR = 6;
}

enum ContourElementType {
  CONTOUR_LINE = 0;
  CONTOUR_ARC = 1;
  CONTOUR_SPLINE = 2;
}

enum DxfEntityType {
  DXF_ENTITY_UNKNOWN = 0;
  DXF_ENTITY_LINE = 1;
  DXF_ENTITY_ARC = 2;
  DXF_ENTITY_CIRCLE = 3;
  DXF_ENTITY_LWPOLYLINE = 4;
  DXF_ENTITY_SPLINE = 5;
  DXF_ENTITY_ELLIPSE = 6;
  DXF_ENTITY_POINT = 7;
}

message LinePrimitive {
  Point2D start = 1;
  Point2D end = 2;
}

message ArcPrimitive {
  Point2D center = 1;
  double radius = 2;
  double start_angle_deg = 3;
  double end_angle_deg = 4;
  bool clockwise = 5;
}

message SplinePrimitive {
  repeated Point2D control_points = 1;
  bool closed = 2;
}

message CirclePrimitive {
  Point2D center = 1;
  double radius = 2;
  double start_angle_deg = 3;
  bool clockwise = 4;
}

message EllipsePrimitive {
  Point2D center = 1;
  Point2D major_axis = 2;
  double ratio = 3;
  double start_param = 4;
  double end_param = 5;
  bool clockwise = 6;
}

message PointPrimitive {
  Point2D position = 1;
}

message ContourElement {
  ContourElementType type = 1;
  LinePrimitive line = 2;
  ArcPrimitive arc = 3;
  SplinePrimitive spline = 4;
}

message ContourPrimitive {
  repeated ContourElement elements = 1;
  bool closed = 2;
}

message Primitive {
  PrimitiveType type = 1;
  LinePrimitive line = 2;
  ArcPrimitive arc = 3;
  SplinePrimitive spline = 4;
  CirclePrimitive circle = 5;
  EllipsePrimitive ellipse = 6;
  PointPrimitive point = 7;
  ContourPrimitive contour = 8;
}

message PrimitiveMeta {
  int32 entity_id = 1;
  DxfEntityType entity_type = 2;
  int32 entity_segment_index = 3;
  bool entity_closed = 4;
  string layer = 5;
  int32 color = 6;
}

message ToleranceSettings {
  double chordal = 1;
  double max_seg = 2;
  double snap = 3;
  double angular = 4;
  double min_seg = 5;
}

message PathHeader {
  uint32 schema_version = 1;
  string source_path = 2;
  string units = 3;
  double unit_scale = 4;
  ToleranceSettings tolerance = 5;
}

message PathBundle {
  PathHeader header = 1;
  repeated Primitive primitives = 2;
  repeated PrimitiveMeta metadata = 3;
}
